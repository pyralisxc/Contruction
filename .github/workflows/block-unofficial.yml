name: Block Unofficial Flags

on:
  pull_request:

jobs:
  block-unofficial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch main for diff
        run: |
          git fetch origin main --depth=1 || true
      - name: Check changed files for unofficial flags
        run: |
          set -e
          files=$(git diff --name-only origin/main...HEAD || true)
          echo "changed files: $files"
          if [ -z "$files" ]; then echo "no changed files"; exit 0; fi
          bad=0
          for f in $files; do
            if [ -f "$f" ]; then
              if grep -nE "HOMEDPOT_MODE\s*=\s*unofficial|ALLOW_UNOFFICIAL\s*=\s*true" "$f" >/dev/null 2>&1; then
                echo "Prohibited flag found in $f"
                grep -nE "HOMEDPOT_MODE\s*=\s*unofficial|ALLOW_UNOFFICIAL\s*=\s*true" "$f" || true
                bad=1
              fi
            fi
          done
          if [ "$bad" -ne 0 ]; then
            echo "PR contains changes that enable unofficial scrapers. Please remove these changes or keep them behind dev-only opt-ins.";
            exit 1
          fi
          echo "No unofficial flags detected in changed files."
